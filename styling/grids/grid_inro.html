<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Introduction</title>
  <style>
    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);  /* 3 equal columns */
      grid-template-rows: 100px 200px 100px;  /* 3 rows with fixed height */
      gap: 4px;  /* gap between items */
    }

    .item {
      background-color: orange;
      border: 1px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
    }

    .item1 {
      grid-column: 1 / 3;  /* spans column 1 and 2 */
      grid-row: 1 / 2;     /* stays in row 1 */
    }

    .item2 {
      grid-column: 3 / 4;  /* column 3 only */
      grid-row: 1 / 3;     /* spans row 1 and 2 */
    }

    .item6 {
      grid-column: 2 / 4;  /* spans column 2 and 3 */
    }
  </style>
</head>
<body>
  <div class="grid-container">
    <div class="item item1">1</div>
    <div class="item item2">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item item6">6</div>
  </div>
</body>
</html>
