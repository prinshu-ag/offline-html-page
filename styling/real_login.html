<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-color: #978c8c;
            border-radius: 8px;
            padding: 30px;
            width: 300px;
        }
        h2 {
            color: #175bba;
            text-align: center;
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: column; 
        }
        input{
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid black;
            background-color: #c7baba;
        }
       button {
        background-color: #0966c4;
        color: #fff;
        padding: 10px;
        border-radius: 8px;
    }
    button:hover{
        background-color: #09077b;
    }
    </style>
</head>
<body>
    <div class="card">
        <h2>login</h2>
        <form >
           <input type="email" name="" id="" placeholder="Email">
           <input type="password" name="" id="" placeholder="password">
          <button type="submit">Login</button>     
        </form>
    </div>
</body>
</html>
