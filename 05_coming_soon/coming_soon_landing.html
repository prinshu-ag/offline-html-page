<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chai Landing Page</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* In case style.css is missing, basic styling */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      /* background-color: #efeeed; */
      background: linear-gradient(135deg, #8a2be2, #4169e1);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .logo {
      width: 100px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.5em;
      margin: 10px 0;
      color: #333;
    }

    p {
      font-size: 1.2em;
      color: #666;
    }

    form {
      margin-top: 20px;
    }

    input[type="email"] {
      padding: 10px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px 20px;
      background-color: #d35400;
      color: white;
      border: none;
      border-radius: 4px;
      margin-left: 10px;
      cursor: pointer;
    }

    button:hover {
      background-color: #e67e22;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <img src="chai_code.jpg" class="logo" alt="chai logo" />
      <h1>Coming Soon</h1>
      <p>We're working hard to bring something amazing. Stay tuned!</p>
      <form id="notify-form">
        <input type="email" placeholder="Enter your email" required />
        <button type="submit">Notify Me</button>
      </form>
    </div>
  </div>
</body>
</html>
